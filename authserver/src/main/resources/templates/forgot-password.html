<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Forgot Password - FlowForge')}">
    <title>Forgot Password - FlowForge</title>
</head>
<body>
<main class="auth-shell">
    <section class="auth-card">
        <header class="auth-header">
            <h1 class="auth-title">Forgot password</h1>
            <p class="auth-subtitle">We will send a secure reset link to your email</p>
        </header>

        <div class="auth-body">
            <div th:replace="~{fragments/layout :: alerts(${error}, ${message})}"></div>

            <!-- Show session expiry warning if parameter exists -->
            <div th:if="${param.sessionExpired}" class="alert alert-warning">
                Your session has expired. Please try the password reset process again.
            </div>

            <form th:action="@{${@apiPaths.authForgotPassword}}" th:object="${forgotPasswordRequest}" method="post" class="auth-form">
                <label for="email">Email Address</label>
                <input id="email" th:field="*{email}" type="email" required placeholder="you@example.com" autofocus>
                <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>

                <button type="submit">Send Reset Link</button>
            </form>

            <p class="switch-link"><a th:href="@{${@apiPaths.authLogin}}">Back to login</a></p>
        </div>
    </section>
</main>
</body>
</html>
