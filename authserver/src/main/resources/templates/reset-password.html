<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Reset Password - FlowForge')}">
    <title>Reset Password - FlowForge</title>
</head>
<body>
<main class="auth-shell">
    <section class="auth-card">
        <header class="auth-header">
            <h1 class="auth-title">Reset password</h1>
            <p class="auth-subtitle">Choose a strong new password</p>
        </header>

        <div class="auth-body">
            <div th:replace="~{fragments/layout :: alerts(${error}, ${message})}"></div>

            <!-- Show session expiry warning if parameter exists -->
            <div th:if="${param.sessionExpired}" class="alert alert-warning">
                Your session has expired. Please use the reset link again to continue.
            </div>

            <form th:action="@{${@apiPaths.authResetPassword}}" th:object="${resetPasswordRequest}" method="post" class="auth-form">
                <input type="hidden" th:field="*{token}">

                <label for="password">New Password</label>
                <input id="password" th:field="*{password}" type="password" required placeholder="Enter new password" autofocus>
                <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>

                <label for="confirmPassword">Confirm Password</label>
                <input id="confirmPassword" th:field="*{confirmPassword}" type="password" required placeholder="Repeat new password">
                <p class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>

                <button type="submit">Reset Password</button>
            </form>

            <p class="switch-link"><a th:href="@{${@apiPaths.authLogin}}">Back to login</a></p>
        </div>
    </section>
</main>
</body>
</html>
