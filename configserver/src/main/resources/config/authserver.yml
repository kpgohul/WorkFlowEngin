spring:
  mail:
    host: ${MAIL_HOSTL}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          debug: ${MAIL_DEBUG}
          starttls:
            enable: true


  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${AUTH_DB}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  task:
    scheduling:
      enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    topic:
      user-registered: ${KAFKA_USER_REGISTERED_TOPIC}
        

app:
  base-url: ${AUTH_BASE_URL}
  gateway-url: ${GATEWAY_BASE_URL}
  mail:
    from: ${MAIL_USERNAME}


auth:
  client:
    auth-code:
      id: ${AUTH_CLIENT_AUTH_CODE_ID}
      secret: ${CLIENT_AUTH_CODE_SECRET}
      redirect-uri: ${AUTH_REDIRECT_URI}
    pkce:
      id: ${AUTH_CLIENT_PKCE_ID}
      redirect-uri: ${AUTH_REDIRECT_URI}
    service:
      id: ${AUTH_CLIENT_SERVICE_ID}
      secret: ${AUTH_CLIENT_SERVICE_SECRET}
  cors:
    allowed-origins: ${AUTH_CORS_ALLOWED_ORIGINS:*}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: ${AUTH_LOG_LVL:INFO}
  pattern:
    console: ${LOGPATTERN_CONSOLE}

server:
  port: 9099
