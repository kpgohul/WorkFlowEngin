spring:
  application:
    name: actionservice

  config:
    import: "optional:configserver:"

  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/your_db
    username: postgres
    password: your_password

  sql:
    init:
      mode: always

kafka:
  bootstrap-servers: localhost:9099
  actions:
    topic: workflow-action-request
    group-id: action-service-group
  results:
    topic: workflow-action-result

app:
  mail:
    from: your-email@gmail.com
    approval-base-url: http://localhost:8080/api/approval/respond