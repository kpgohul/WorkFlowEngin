<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Approval Request</title>
    <style>
        body { margin:0; padding:0; background:#f5f7fb; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; }
        .container { max-width: 680px; margin: 0 auto; padding: 24px; }
        .card { background:#ffffff; border-radius: 16px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); overflow:hidden; }
        .header { padding: 22px 24px; background: linear-gradient(90deg, #0ea5e9, #6366f1); color:#fff; }
        .header h1 { margin:0; font-size: 18px; font-weight: 700; letter-spacing: 0.2px; }
        .body { padding: 22px 24px; color:#0f172a; }
        .pill { display:inline-block; padding: 6px 10px; border-radius: 999px; font-size: 12px; background: #eef2ff; color: #3730a3; margin-top: 10px; }
        .meta { margin-top: 14px; font-size: 13px; color:#475569; line-height: 1.5; }
        .message { margin-top: 16px; padding: 14px 14px; background:#f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; white-space: pre-wrap; }
        .actions { margin-top: 18px; display:flex; gap: 12px; flex-wrap: wrap; }
        .btn { display:inline-block; text-decoration:none; padding: 12px 16px; border-radius: 12px; font-weight: 700; font-size: 14px; }
        .btn-approve { background:#16a34a; color:#fff; }
        .btn-reject { background:#ef4444; color:#fff; }
        .footer { padding: 16px 24px; font-size: 12px; color:#64748b; border-top: 1px solid #eef2f7; }
        .muted { color:#64748b; font-size: 12px; }
        @media (max-width: 520px) {
            .container { padding: 12px; }
            .actions { flex-direction: column; }
            .btn { text-align:center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1 th:text="'Approval required: ' + ${actionName}">Approval required</h1>
            <div class="pill" th:text="${approvalType}">ANY</div>
        </div>
        <div class="body">
            <div class="meta">
                <div><strong>Execution:</strong> <span th:text="${executionId}">0</span></div>
                <div><strong>Execution Step:</strong> <span th:text="${executionStepId}">0</span></div>
            </div>

            <div class="message" th:text="${message}">Please review and respond.</div>

            <div class="actions">
                <a class="btn btn-approve" th:href="${approveUrl}">Accept</a>
                <a class="btn btn-reject" th:href="${rejectUrl}">Reject</a>
            </div>

            <div class="muted" style="margin-top: 14px;">
                If the buttons don’t work, copy and paste the links into your browser.
            </div>
        </div>
        <div class="footer">
            This request was generated by FlowForge Action Service.
        </div>
    </div>
</div>
</body>
</html>
