<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Notification</title>
    <style>
        body { margin:0; padding:0; background:#f5f7fb; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; }
        .container { max-width: 680px; margin: 0 auto; padding: 24px; }
        .card { background:#ffffff; border-radius: 16px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); overflow:hidden; }
        .header { padding: 22px 24px; background: linear-gradient(90deg, #22c55e, #0ea5e9); color:#fff; }
        .header h1 { margin:0; font-size: 18px; font-weight: 800; }
        .body { padding: 22px 24px; color:#0f172a; }
        .meta { margin-top: 10px; font-size: 13px; color:#475569; line-height: 1.5; }
        .message { margin-top: 16px; padding: 14px; background:#f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; white-space: pre-wrap; }
        .footer { padding: 16px 24px; font-size: 12px; color:#64748b; border-top: 1px solid #eef2f7; }
        @media (max-width: 520px) { .container { padding: 12px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1 th:text="${title}">Notification</h1>
        </div>
        <div class="body">
            <div class="meta">
                <div><strong>Execution:</strong> <span th:text="${executionId}">0</span></div>
                <div><strong>Execution Step:</strong> <span th:text="${executionStepId}">0</span></div>
            </div>

            <div class="message" th:text="${message}">Message</div>
        </div>
        <div class="footer">
            This notification was generated by FlowForge Action Service.
        </div>
    </div>
</div>
</body>
</html>
