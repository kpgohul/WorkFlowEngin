<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Approval Response</title>
    <style>
        body { margin:0; padding:0; background:#f5f7fb; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; }
        .wrap { min-height: 100vh; display:flex; align-items:center; justify-content:center; padding: 24px; }
        .card { max-width: 720px; width: 100%; background:#fff; border-radius: 18px; box-shadow: 0 10px 26px rgba(15,23,42,0.10); overflow:hidden; }
        .header { padding: 18px 22px; background: linear-gradient(90deg,#6366f1,#0ea5e9); color:#fff; }
        .header h1 { margin:0; font-size: 18px; font-weight: 800; }
        .body { padding: 22px; color:#0f172a; }
        .badge { display:inline-block; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
        .ok { background:#dcfce7; color:#166534; }
        .warn { background:#fef9c3; color:#854d0e; }
        .meta { margin-top: 14px; color:#475569; font-size: 13px; line-height: 1.6; }
        .msg { margin-top: 14px; padding: 14px; background:#f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; white-space: pre-wrap; }
        .footer { padding: 14px 22px; border-top: 1px solid #eef2f7; color:#64748b; font-size: 12px; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <div class="header">
            <h1>Thanks for your response</h1>
        </div>
        <div class="body">
            <div>
                <span class="badge" th:classappend="${resolved} ? ' ok' : ' warn'" th:text="${title}">Recorded</span>
            </div>

            <div class="meta">
                <div><strong>Execution:</strong> <span th:text="${executionId}">-</span></div>
                <div><strong>Execution Step:</strong> <span th:text="${executionStepId}">-</span></div>
            </div>

            <div class="msg" th:text="${message}">Message</div>
        </div>
        <div class="footer">You can safely close this window now.</div>
    </div>
</div>
</body>
</html>
