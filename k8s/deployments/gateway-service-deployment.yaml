apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  labels:
    app: gateway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      initContainers:
        - name: wait-for-all-services
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z config-service 9091 && nc -z auth-service 9099 && nc -z action-service 9096 && nc -z user-service 9097 && nc -z workflow-service 9094 && nc -z execution-service 9095; do echo 'Waiting for all internal services to boot...'; sleep 3; done"
      containers:
        - name: gateway-service
          image: gohulkp/gateway-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9093
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
          env:
            - name: CONFIG_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: global-config
                  key: CONFIG_BASE_URL
