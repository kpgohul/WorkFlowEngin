apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  labels:
    app: gateway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      initContainers:
        - name: wait-for-all-services
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z config-service 9091 && nc -z auth-service 9099 && nc -z action-service 8080 && nc -z user-service 8080 && nc -z workflow-service 8080 && nc -z execution-service 8080 && nc -z notification-service 8080; do echo 'Waiting for all internal services to boot...'; sleep 3; done"
      containers:
        - name: gateway-service
          image: gateway-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9093
          env:
            - name: CONFIG_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: global-config
                  key: CONFIG_BASE_URL
