apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service
  labels:
    app: config-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-service
  template:
    metadata:
      labels:
        app: config-service
    spec:
      containers:
        - name: config-service
          image: gohulkp/config-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9091
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
          envFrom:
            - secretRef:
                name: app-secrets
            - configMapRef:
                name: global-config
