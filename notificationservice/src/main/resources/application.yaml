spring:
  application:
    name: notification-service

  r2dbc:
    url: r2dbc:postgresql://postgres:5432/workflow_db
    username: postgres
    password: postgres

  kafka:
    bootstrap-servers: kafka:9092

  mail:
    host: smtp.gmail.com
    port: 587
    username: your_email
    password: your_password
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka